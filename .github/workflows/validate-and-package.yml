name: Validate and Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install proof dependencies
        run: pip install -r requirements-proof.txt

      - name: Python syntax smoke check
        run: python scripts/smoke_syntax.py

      - name: Validate skills
        run: python scripts/validate-skills.py

      - name: Validate assets registry
        run: python scripts/validate-assets.py

      - name: Validate plugin manifest
        run: python scripts/validate-plugin-manifest.py

      - name: Validate evidence manifest example
        run: python scripts/validate-evidence-manifest.py

      - name: Validate framework examples (FERPA, COPPA, NIST AI RMF)
        run: |
          pip install pyyaml
          python examples/ferpa-education-records/validate_ferpa_scope.py
          python examples/coppa-parental-consent/validate_consent.py
          python examples/nist-ai-rmf-profile/validate_profile.py

      - name: Validate SME provenance on reference checklists
        run: python scripts/validate-sme-provenance.py

      - name: Validate regulatory report generator (sample)
        run: |
          pip install pyyaml
          python scripts/generate-regulatory-report.py examples/regulatory-reports/hipaa-llm-intake/findings-input.yaml -o /tmp/hipaa-report.md

  lint:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff mypy types-PyYAML

      - name: Ruff check
        run: ruff check agent.py redaction.py scripts/ compliance_tests/

      - name: Ruff format check
        run: ruff format --check agent.py redaction.py scripts/ compliance_tests/

      - name: Mypy
        run: mypy agent.py redaction.py scripts/

  security:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install pip-audit bandit detect-secrets

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements-lock.txt --strict --desc on

      - name: Bandit (Python SAST)
        run: bandit -r agent.py redaction.py scripts/ -c pyproject.toml

      - name: detect-secrets scan
        run: detect-secrets scan --baseline .secrets.baseline .

  test:
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked runtime and test dependencies
        run: pip install -r requirements-lock.txt -r requirements-dev.txt

      - name: Run tests with coverage (≥80% on agent.py + redaction.py)
        run: python -m pytest compliance_tests/ -v --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Demo agent smoke (TestModel)
        run: python scripts/demo_agent.py "Scope PCI script audit for https://example.com/checkout"

  package-vscode:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VS Code extension
        working-directory: vscode-extension
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: compliance-agent-skills-vsix
          path: vscode-extension/*.vsix
