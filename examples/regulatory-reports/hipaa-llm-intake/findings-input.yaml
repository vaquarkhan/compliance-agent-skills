    observation: Subprocessor list for MCP host missing from BAA exhibit B.
    recommendation: Execute BAAs and flow-down terms for all LLM/MCP vendors touching ePHI flows.
    evidence_refs:
      - art-baa-register
    remediation_owner: privacy-office
    remediation_due: "2026-08-01"

